<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Offline — Cherupushpa Mission League</title>
  <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml" />
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      background: radial-gradient(circle at 30% 20%, #2b1240, #0a0817 70%);
      color: #f5f3ff;
      font-family: 'Poppins', system-ui, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin: 0; }
    p { color: rgba(245,243,255,0.7); max-width: 32ch; margin: 0; }
    button {
      margin-top: 1rem;
      padding: 0.85rem 1.75rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(145deg, #f1d576, #d4af37);
      color: #241a0a;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      min-height: 48px;
    }
  </style>
</head>
<body>
  <h1>You're offline</h1>
  <p>Cherupushpa Mission League couldn't reach the network. Please check your connection and try again.</p>
  <button type="button" onclick="location.reload()">Retry</button>
</body>
</html>
