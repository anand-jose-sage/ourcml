<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Cherupushpa Mission League app icon">
  <!-- Maskable: background fills the full canvas; foreground kept within the ~80% safe zone. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b1240"/>
      <stop offset="100%" stop-color="#0a0817"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1d576"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#gold)" stroke-width="16"/>
  <text x="256" y="292" text-anchor="middle" font-family="'Poppins', system-ui, sans-serif" font-weight="700" font-size="112" fill="url(#gold)">CML</text>
</svg>
